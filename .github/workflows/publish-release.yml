name: Publish Release

on:
  workflow_dispatch:

jobs:
  publish:
    name: Publish Release
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      packages: write
      contents: write
      attestations: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Extract version from package
        id: version
        run: |
          # Extract version from wit/imports.wit
          VERSION=$(grep -oP 'package wasi:webgpu@\K[^;]+' wit/imports.wit)
          if [[ ! "$VERSION" =~ ^0\.2\.0-rc\.[0-9]+$ ]]; then
            echo "Error: Version '$VERSION' is not a valid RC version"
            exit 1
          fi
          TAG="v${VERSION}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "Publishing version: $VERSION"

      - name: Check tag doesn't exist
        run: |
          if git tag -l "${{ steps.version.outputs.tag }}" | grep -q .; then
            echo "Error: Tag ${{ steps.version.outputs.tag }} already exists"
            exit 1
          fi

      - name: Create git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag -a "${{ steps.version.outputs.tag }}" -m "Release ${{ steps.version.outputs.version }}"
          git push origin "${{ steps.version.outputs.tag }}"

      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ steps.version.outputs.tag }}" \
            --title "${{ steps.version.outputs.version }}" \
            --prerelease \
            --generate-notes

      - name: Install cargo-binstall
        uses: cargo-bins/cargo-binstall@80aaafe04903087c333980fa2686259ddd34b2d9 # v1.16.6

      - name: Install wkg
        # Pin the exact version. The version that builds the component (wkg wit
        # build) and the version that pushes/decodes it (the publish step) must
        # match, or async export names like `[async method]gpu.request-adapter`
        # encoded by one are rejected by the other.
        run: cargo binstall -y wkg@0.15.1

      - name: Login to GitHub Container Registry
        uses: docker/login-action@5e57cd118135c172c3672efd75eb46360885c0ef # v3.6.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build WIT package
        run: wkg wit build -o wasi-webgpu.wasm

      - name: Publish to GitHub Container Registry
        id: publish
        # Pinned to a main commit (not v5) because the `wkg` version input is
        # only honored on main; v5 always installs the latest wkg, which can
        # differ from the build version and fail to decode async export names.
        uses: bytecodealliance/wkg-github-action@5b7005d1fc81c8c3380a059e58345033e3a97638 # main
        with:
          wkg: "0.15.1"
          oci-reference-without-tag: ghcr.io/webassembly/wasi/webgpu
          file: wasi-webgpu.wasm
          description: 'WASI WebGPU API'
          source: https://github.com/WebAssembly/wasi-webgpu
          homepage: https://github.com/WebAssembly/wasi-webgpu
          version: ${{ steps.version.outputs.version }}
          licenses: Apache-2.0 WITH LLVM-exception

      - name: Attest build provenance
        uses: actions/attest-build-provenance@00014ed6ed5efc5b1ab7f7f34a39eb55d41aa4f8 # v3.1.0
        with:
          subject-name: ghcr.io/webassembly/wasi/webgpu
          subject-digest: ${{ steps.publish.outputs.digest }}
          push-to-registry: true

      - name: Upload wasm to release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release upload "${{ steps.version.outputs.tag }}" wasi-webgpu.wasm
